<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Mi Lista de Tareas</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    background: linear-gradient(135deg, #667eea, #764ba2);
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 20px;
  }
  .container {
    background: #fff;
    border-radius: 16px;
    box-shadow: 0 20px 60px rgba(0,0,0,0.2);
    width: 100%;
    max-width: 480px;
    padding: 32px;
  }
  h1 { color: #333; margin-bottom: 8px; font-size: 28px; }
  .subtitle { color: #888; font-size: 14px; margin-bottom: 24px; }
  .input-row { display: flex; gap: 8px; margin-bottom: 20px; }
  input[type="text"] {
    flex: 1; padding: 12px 16px;
    border: 2px solid #e5e7eb; border-radius: 8px;
    font-size: 15px; outline: none; transition: border-color 0.2s;
  }
  input[type="text"]:focus { border-color: #667eea; }
  button {
    background: #667eea; color: #fff; border: none;
    padding: 12px 20px; border-radius: 8px;
    font-size: 15px; cursor: pointer; transition: background 0.2s;
  }
  button:hover { background: #5568d3; }
  ul { list-style: none; }
  li {
    display: flex; align-items: center; gap: 12px;
    padding: 12px; border-bottom: 1px solid #f0f0f0;
    transition: background 0.2s;
  }
  li:hover { background: #fafafa; }
  li.done span { text-decoration: line-through; color: #aaa; }
  li span { flex: 1; color: #333; }
  input[type="checkbox"] {
    width: 20px; height: 20px; cursor: pointer; accent-color: #667eea;
  }
  .delete {
    background: transparent; color: #ef4444;
    padding: 4px 8px; font-size: 18px;
  }
  .delete:hover { background: #fee2e2; }
  .empty {
    text-align: center; color: #bbb;
    padding: 32px 0; font-style: italic;
  }
  .footer {
    margin-top: 20px; font-size: 13px;
    color: #888; text-align: center;
  }
</style>
</head>
<body>
  <div class="container">
    <h1>Mis Tareas</h1>
    <p class="subtitle">Organizá tu día</p>
    <div class="input-row">
      <input type="text" id="taskInput" placeholder="¿Qué necesitás hacer?" />
      <button onclick="addTask()">Agregar</button>
    </div>
    <ul id="taskList"></ul>
    <p class="footer"><span id="count">0</span> tareas pendientes</p>
  </div>
<script>
  let tasks = [];
  function render() {
    const list = document.getElementById('taskList');
    list.innerHTML = '';
    if (tasks.length === 0) {
      list.innerHTML = '<p class="empty">No hay tareas todavía ✨</p>';
    } else {
      tasks.forEach((task, i) => {
        const li = document.createElement('li');
        if (task.done) li.className = 'done';
        li.innerHTML = `
          <input type="checkbox" ${task.done ? 'checked' : ''} onchange="toggle(${i})" />
          <span>${escape(task.text)}</span>
          <button class="delete" onclick="remove(${i})">×</button>
        `;
        list.appendChild(li);
      });
    }
    const pending = tasks.filter(t => !t.done).length;
    document.getElementById('count').textContent = pending;
  }
  function escape(s) {
    const div = document.createElement('div');
    div.textContent = s;
    return div.innerHTML;
  }
  function addTask() {
    const input = document.getElementById('taskInput');
    const text = input.value.trim();
    if (!text) return;
    tasks.push({ text, done: false });
    input.value = '';
    render();
  }
  function toggle(i) { tasks[i].done = !tasks[i].done; render(); }
  function remove(i) { tasks.splice(i, 1); render(); }
  document.getElementById('taskInput').addEventListener('keypress', e => {
    if (e.key === 'Enter') addTask();
  });
  render();
</script>
</body>
</html>
