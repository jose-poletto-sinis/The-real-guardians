name: Deploy to Vercel

on:
  create:
  push:
    branches:
      - '**'

jobs:
  deploy:
    if: github.event_name == 'push' || (github.event_name == 'create' && github.ref_type == 'branch')
    runs-on: ubuntu-latest

    env:
      VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
      MY_ORG_ID: team_pYjcIbYGzZsmXaVhavHRvwWK
      MY_PROJECT_NAME: the-real-guardians

    steps:
      - name: Checkout codigo
        uses: actions/checkout@v4

      - name: Instalar Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Instalar Vercel CLI
        run: npm install -g vercel@latest

      - name: Configurar proyecto Vercel
        run: |
          RESULT=$(curl -s -X POST "https://api.vercel.com/v10/projects?teamId=$MY_ORG_ID" \
            -H "Authorization: Bearer $VERCEL_TOKEN" \
            -H "Content-Type: application/json" \
            -d "{\"name\":\"$MY_PROJECT_NAME\",\"framework\":\"nextjs\"}")
          PROJECT_ID=$(echo "$RESULT" | jq -r '.id // empty')
          if [ -z "$PROJECT_ID" ]; then
            RESULT=$(curl -s "https://api.vercel.com/v9/projects/$MY_PROJECT_NAME?teamId=$MY_ORG_ID" \
              -H "Authorization: Bearer $VERCEL_TOKEN")
            PROJECT_ID=$(echo "$RESULT" | jq -r '.id // empty')
          fi
          echo "Project ID: $PROJECT_ID"
          rm -rf .vercel
          mkdir -p .vercel
          echo "{\"projectId\":\"$PROJECT_ID\",\"orgId\":\"$MY_ORG_ID\"}" > .vercel/project.json
          cat .vercel/project.json

      - name: Pull entorno de Vercel
        run: vercel pull --yes --environment=production --token "$VERCEL_TOKEN"

      - name: Build del proyecto
        run: vercel build --prod --token "$VERCEL_TOKEN"

      - name: Deploy a produccion en Vercel
        id: deploy
        run: |
          url=$(vercel deploy --prebuilt --prod --token "$VERCEL_TOKEN")
          echo "deploy_url=$url" >> $GITHUB_OUTPUT

      - name: Mostrar URL del deploy
        run: echo "Deployed to ${{ steps.deploy.outputs.deploy_url }}"
