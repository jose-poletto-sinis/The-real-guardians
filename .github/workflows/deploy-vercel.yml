name: Deploy to Vercel

on:
  create:
  push:
    branches:
      - '**'

jobs:
  deploy:
    if: github.event_name == 'push' || (github.event_name == 'create' && github.ref_type == 'branch')
    runs-on: ubuntu-latest

    env:
      VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}

    steps:
      - name: Checkout código
        uses: actions/checkout@v4

      - name: Instalar Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Instalar Vercel CLI
        run: npm install -g vercel@latest

      - name: Deploy a producción en Vercel
        id: deploy
        run: |
          rm -rf .vercel
          url=$(vercel --prod --yes --token "$VERCEL_TOKEN")
          echo "deploy_url=$url" >> $GITHUB_OUTPUT

      - name: Mostrar URL del deploy
        run: echo "Deployed to ${{ steps.deploy.outputs.deploy_url }}"
